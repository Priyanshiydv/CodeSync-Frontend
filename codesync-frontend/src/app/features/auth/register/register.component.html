<div class="auth-wrapper">
  <div class="auth-container" style="max-width: 480px;">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><span>&#60;/&#62;</span></div>
      <h1>CodeSync</h1>
      <p>Create your account and start collaborating</p>
    </div>

    <!-- Register Card -->
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join thousands of developers on CodeSync</p>

      <!-- Messages -->
      <div class="alert alert-danger" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>
      <div class="alert alert-success" *ngIf="successMessage">
        ✅ {{ successMessage }}
      </div>

      <form (ngSubmit)="onRegister()">

        <!-- Full Name -->
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              [(ngModel)]="registerData.fullName"
              name="fullName"
              placeholder="Enter your full name"
              required
              class="form-input"/>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              type="email"
              [(ngModel)]="registerData.email"
              name="email"
              placeholder="Enter your email"
              required
              class="form-input"/>
          </div>
        </div>

        <!-- Role -->
        <div class="form-group">
          <label>Role</label>
          <div class="input-wrapper">
            <span class="input-icon">🎭</span>
            <select
              [(ngModel)]="registerData.role"
              name="role"
              class="form-input form-select">
              <option *ngFor="let r of roles"
                [value]="r.role">
                {{ r.role }} — {{ r.description }}
              </option>
            </select>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="registerData.password"
              name="password"
              placeholder="Min 6 characters"
              required
              class="form-input"/>
            <span class="toggle-password"
              (click)="showPassword = !showPassword">
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              [(ngModel)]="registerData.confirmPassword"
              name="confirmPassword"
              placeholder="Re-enter your password"
              required
              class="form-input"/>
          </div>
        </div>

        <!-- Register Button -->
        <button
          type="submit"
          class="btn-primary"
          [disabled]="isLoading">
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading">Creating...</span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider"><span>or sign up with</span></div>

      <!-- OAuth2 -->
      <div class="oauth-buttons">
        <button class="btn-oauth btn-github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
        </button>
        <button class="btn-oauth btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Google
        </button>
        </div>

      <!-- Login Link -->
      <p class="auth-link">
        Already have an account?
        <a routerLink="/auth/login">Sign in</a>
      </p>

    </div>
  </div>

  <!-- Background -->
  <div class="auth-bg">
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
  </div>
</div>
