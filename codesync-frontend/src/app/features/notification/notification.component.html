<div class="notification-wrapper">
  <button class="bell-btn" (click)="toggleDropdown()">
    <span class="bell-icon">🔔</span>
    <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <div class="notification-dropdown" *ngIf="isOpen" (click)="$event.stopPropagation()">
    <div class="dropdown-header">
      <h4>Notifications</h4>
      <div class="header-actions">
        <button class="mark-all-btn" *ngIf="unreadCount > 0" (click)="markAllRead()">
          Mark all read
        </button>
        <button class="clear-btn" (click)="clearRead()">Clear read</button>
      </div>
    </div>

    <div class="notification-list">
      <div class="loading-spinner" *ngIf="loading">
        Loading...
      </div>

      <div class="empty-state" *ngIf="!loading && notifications.length === 0">
        <span>🔔</span>
        <p>No notifications yet</p>
      </div>

      <div class="notification-item" 
           *ngFor="let n of notifications"
           [class.unread]="!n.isRead"
           (click)="handleNotificationClick(n)">
        <div class="notification-icon">
          {{ getNotificationIcon(n.type) }}
        </div>
        <div class="notification-content">
          <div class="notification-title">{{ n.title || 'Notification' }}</div>
          <div class="notification-message">{{ n.message }}</div>
          <div class="notification-time">{{ getTimeAgo(n.createdAt) }}</div>
        </div>
        <div class="notification-actions">
          <button class="mark-read-btn" 
                  *ngIf="!n.isRead" 
                  (click)="markAsRead(n.notificationId); $event.stopPropagation()"
                  title="Mark as read">
            ✓
          </button>
          <button class="delete-btn" 
                  (click)="deleteNotification(n.notificationId); $event.stopPropagation()"
                  title="Delete">
            🗑️
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
